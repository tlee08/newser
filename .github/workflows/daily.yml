name: Daily Quiz Generation & Deploy

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6 AM UTC
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate fresh quiz data
        run: pnpm generate-quiz --fresh
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Typecheck & build
        run: pnpm build

      - name: Commit updated quiz data
        run: |
          git config user.name "newser-bot"
          git config user.email "bot@newser.app"
          git add public/quizzes.json
          git diff --staged --quiet || git commit -m "chore: daily quiz update [skip ci]"
          git push

      - name: Upload collected data to R2
        run: |
          find resources/collected_data -type f -name "*.json" | while read -r f; do
            pnpm exec wrangler r2 object put "newser/collected_data/$(basename "$f")" --file "$f" --remote
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate promo images
        run: |
          LATEST=$(ls -t resources/collected_data/*.json | head -1)
          FILENAME=$(basename "$LATEST")
          pnpm generate-promo --file "$FILENAME"

      - name: Finalise promo images
        run: bash scripts/finalise-promos.sh

      - name: Upload promo images to R2
        run: |
          find resources/promotion_images_finalised -type f -name "*.png" | while read -r f; do
            pnpm exec wrangler r2 object put "newser/promotion_images_finalised/${f#resources/promotion_images_finalised/}" --file "$f" --remote
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
