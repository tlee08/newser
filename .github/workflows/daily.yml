name: Daily Quiz Generation & Deploy

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6 AM UTC
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate fresh quiz data
        run: pnpm generate-quiz --fresh
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Typecheck & build
        run: pnpm build

      - name: Commit updated quiz data
        run: |
          git config user.name "newser-bot"
          git config user.email "bot@newser.app"
          git add public/quizzes.json
          git diff --staged --quiet || git commit -m "chore: daily quiz update [skip ci]"
          git push

      - name: Generate promo images
        run: |
          LATEST=$(ls -t resources/collected_data/*.json | head -1)
          FILENAME=$(basename "$LATEST")
          pnpm generate-promo --file "$FILENAME"
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Finalise promo images
        run: bash scripts/finalise-promos.sh

      - name: Upload collected data to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            r2 object put newser-promos/collected_data/ --recursive --file resources/collected_data/

      - name: Upload promo images to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            r2 object put newser-promos/promotion_images_finalised/ --recursive --file resources/promotion_images_finalised/
